<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="acsDesigns" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        const storedTheme = localStorage.getItem('theme');
        const initialTheme = storedTheme === 'light' ? 'light' : 'dark';
        document.documentElement.className = initialTheme;
        document.documentElement.style.colorScheme = initialTheme;
        document.documentElement.style.backgroundColor = initialTheme === 'dark' ? '#101013' : '#e2ddda';
        document.documentElement.style.color = initialTheme === 'dark' ? '#ffffff' : '#000000';
      })();
    </script>
    <title>Austin Schultz</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
